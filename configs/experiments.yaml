# SGSAT-KT Experiment Configurations
# 实验配置文件

# Quick Test (快速验证)
quick_test:
  dataset: "algebra05"
  n_epochs: 10
  batch_size: 32
  training:
    early_stop: 3

# Baseline Training (基线训练)
baseline:
  dataset: "assist09"
  n_epochs: 100
  model:
    use_llm: false
    use_gnn: false
  training:
    batch_size: 16
    learning_rate: 0.001

# Full SGSAT-KT (完整模型)
full_model:
  dataset: "assist09"
  n_epochs: 200
  model:
    use_llm: true
    use_gnn: true
  llm:
    pretrained_model: "bert-base-chinese"
    llm_weight: 0.3
  gnn:
    n_kc: 123
    gnn_layers: 2
    graph_weight: 0.3
  recommendation:
    cl_loss: true
    lambda_cl: 0.1

# Ablation Studies (消融实验)
ablation:
  # Only LLM
  only_llm:
    model:
      use_llm: true
      use_gnn: false

  # Only GNN
  only_gnn:
    model:
      use_llm: false
      use_gnn: true

  # Without CL Loss
  without_cl:
    model:
      use_llm: true
      use_gnn: true
    recommendation:
      cl_loss: false

# Chinese Dataset (中文数据集)
chinese:
  dataset: "doudouyun"
  n_epochs: 100
  model:
    use_llm: true
    use_gnn: false
  llm:
    pretrained_model: "bert-base-chinese"
    llm_weight: 0.5

# Large Scale Training (大规模训练)
large_scale:
  dataset: "assist17"
  n_epochs: 200
  batch_size: 32
  model:
    use_llm: true
    use_gnn: true
  training:
    learning_rate: 0.0005

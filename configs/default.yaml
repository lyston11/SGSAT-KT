# TriSG-KT Default Configuration
# 默认配置文件
# 注意：只列出实际生效的配置项。每个键都会被训练脚本读取并传递给模型。

# Model Settings
model:
  d_model: 256
  d_fc: 512
  n_heads: 8
  n_layers: 2
  n_know: 64
  dropout: 0.2
  window: 1
  id_dim: 128           # ID embedding 固定维度
  llm_proj_dim: 256     # LLM 投影目标维度
  llm_inter_dim: 512    # LLM 中间投影维度
  id_dropout_rate: 0.15 # ID embedding dropout 概率（迫使模型依赖 LLM 信号）
  cross_attn_heads: 4   # Cross-Attention 头数（v4.0: ID Query attend LLM）

# Innovation 1: LLM Semantic Grounding
llm:
  use_llm: true
  pretrained_model: "pretrained_models/qwen3-4b"
  freeze_bert: true
  lambda_contra: 0.3          # 辅助对比损失权重（v3.0）
  contrast_temperature: 0.07  # InfoNCE 温度（v3.0）

# Innovation 2: GNN Prerequisite Graph
gnn:
  use_gnn: true
  n_kc: 865
  gnn_layers: 2

# Innovation 3: 对比学习 + DCF-Sim 后处理工具
recommendation:
  use_graph_similarity: false  # DCFSimGraphEnhanced 标记（后处理工具，不影响训练）
  cl_loss: false
  lambda_cl: 0.1

# 预计算嵌入配置
precomputed:
  use_precomputed: true  # Qwen3预计算嵌入

# Training Settings
training:
  batch_size: 16  # 双GPU配置（每卡8，安全值）
  test_batch_size: 8
  n_epochs: 20
  learning_rate: 0.001
  l2: 0.00001
  early_stop: 5
  device: "cuda"
  with_pid: false
  save_model: true
  dataset: "xes"  # 默认数据集
  gradient_accumulation_steps: 2  # 梯度累积，模拟batch_size=32
  validation_ratio: 0.1
  validation_seed: 42

# GPU Settings（自动选最空闲的单 GPU，DataParallel 对当前模型无效）
gpu:
  device_ids: [0, 1]  # 候选 GPU 列表，训练时自动选最空闲的

# =================== 预设配置 ===================
# 快速切换训练模式，所有参数都可以在这里修改
presets:
  # 快速测试（验证代码）
  test:
    training:
      batch_size: 32
      n_epochs: 5
      early_stop: 3
    llm:
      use_llm: false
    gnn:
      use_gnn: false

  # 基线模型（无增强）
  baseline:
    training:
      batch_size: 8
      gradient_accumulation_steps: 4
      n_epochs: 100
    llm:
      use_llm: false
    gnn:
      use_gnn: false

  # 完整模型（LLM + GNN）
  full:
    training:
      batch_size: 4   # d_model=256 + n_know=64, 12GB GPU 实际只能4
      gradient_accumulation_steps: 8  # 梯度累积8步=有效batch 32
      n_epochs: 30
      early_stop: 999  # 禁用早停，跑满30轮
    llm:
      use_llm: true
      pretrained_model: "pretrained_models/qwen3-4b"
      lambda_contra: 0.3
      contrast_temperature: 0.07
    gnn:
      use_gnn: true
    recommendation:
      cl_loss: true

  # 生产环境（最佳性能）
  prod:
    training:
      batch_size: 32  # 双GPU配置
      n_epochs: 200
      learning_rate: 0.0005
    llm:
      use_llm: true
    gnn:
      gnn_layers: 3
      use_gnn: true

  # 基线对比模型（论文实验用）
  sakt:
    training:
      batch_size: 32
      n_epochs: 100
      early_stop: 5
    llm:
      use_llm: false
    gnn:
      use_gnn: false
    model:
      _baseline: sakt

  akt:
    training:
      batch_size: 32
      n_epochs: 100
      early_stop: 5
    llm:
      use_llm: false
    gnn:
      use_gnn: false
    model:
      _baseline: akt

  dkt:
    training:
      batch_size: 32
      n_epochs: 100
      early_stop: 5
    llm:
      use_llm: false
    gnn:
      use_gnn: false
    model:
      _baseline: dkt

  dkvmn:
    training:
      batch_size: 32
      n_epochs: 100
      early_stop: 5
    llm:
      use_llm: false
    gnn:
      use_gnn: false
    model:
      _baseline: dkvmn
